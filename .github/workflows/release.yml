name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.0.1-test)'
        required: false
        default: '0.0.1-test'

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  build-installer:
    name: Build MSI Installer
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $input = "${{ github.event.inputs.version }}"
          if ($tag -match '^v') {
            $version = $tag -replace '^v', ''
          } elseif ($input) {
            $version = $input
          } else {
            $version = "0.0.1-test"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Restore
        run: dotnet restore HeyStupid/HeyStupid.csproj -r win-x64 -p:Platform=x64

      - name: Publish
        shell: pwsh
        run: |
          msbuild HeyStupid/HeyStupid.csproj `
            -t:Publish `
            -p:Configuration=Release `
            -p:Platform=x64 `
            -p:RuntimeIdentifier=win-x64 `
            -p:SelfContained=true `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishDir=${{ github.workspace }}\publish\ `
            -restore

          # The publish step drops HeyStupid.pri - copy it from the build output
          $buildDir = "HeyStupid\bin\x64\Release\net10.0-windows10.0.22621.0\win-x64"
          $priFile = Join-Path $buildDir "HeyStupid.pri"
          if (Test-Path $priFile) {
            Copy-Item $priFile -Destination .\publish\ -Force
            Write-Host "Copied HeyStupid.pri from build output"
          } else {
            Write-Error "HeyStupid.pri not found in build output!"
          }

      - name: Verify publish output
        shell: pwsh
        run: |
          Write-Host "=== PRI files ==="
          Get-ChildItem ./publish -Filter *.pri -Recurse | ForEach-Object { $_.FullName }
          Write-Host "=== XBF files ==="
          Get-ChildItem ./publish -Filter *.xbf -Recurse | ForEach-Object { $_.FullName }
          Write-Host "=== Key files ==="
          $check = @("HeyStupid.exe","HeyStupid.dll","HeyStupid.pri","Microsoft.ui.xaml.dll")
          foreach ($f in $check) {
            $found = Test-Path "./publish/$f"
            Write-Host "$f : $found"
          }

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 7.0.0

      - name: Harvest publish output
        shell: pwsh
        run: ./installer/harvest.ps1 -PublishDir ./publish -OutputPath ./installer/HarvestedFiles.wxs

      - name: Build MSI
        shell: pwsh
        run: |
          $publishDir = (Resolve-Path ./publish).Path
          $version = "${{ steps.version.outputs.VERSION }}"

          # Ensure version has exactly 3 parts for MSI
          $parts = $version.Split('.')
          while ($parts.Length -lt 3) { $parts += '0' }
          $msiVersion = ($parts[0..2]) -join '.'

          $iconPath = (Resolve-Path ./publish/Assets/trayicon.ico).Path

          wix build `
            -acceptEula wix7 `
            -arch x64 `
            -d ProductVersion="$msiVersion" `
            -d IconPath="$iconPath" `
            ./installer/HeyStupid.wxs `
            ./installer/HarvestedFiles.wxs `
            -o ./output/HeyStupid-$version-x64.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: ./output/*.msi

      - name: Upload portable zip
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./output/HeyStupid-${{ steps.version.outputs.VERSION }}-x64-portable.zip

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-zip
          path: ./output/*.zip

  release:
    name: Create GitHub Release
    needs: build-installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          INPUT="${{ github.event.inputs.version }}"
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          elif [[ -n "$INPUT" ]]; then
            echo "VERSION=$INPUT" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.1-test" >> $GITHUB_OUTPUT
          fi

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: msi-installer
          path: ./artifacts

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: portable-zip
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hey Stupid v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ./artifacts/*.msi
            ./artifacts/*.zip